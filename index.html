<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة رتّيل الشاملة | النسخة النهائية المستقرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-glass: rgba(20, 30, 53, 0.65);
            --accent: #10b981;
            --accent-hover: #059669;
            --gold: #fbbf24;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.2s ease; }
        
        body { 
            background-color: var(--bg-main); 
            background-image: radial-gradient(circle at 5% 10%, rgba(16, 185, 129, 0.07) 0%, transparent 40%), 
                              radial-gradient(circle at 95% 85%, rgba(251, 191, 36, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 90px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .logo { font-size: 28px; color: var(--gold); margin-bottom: 40px; text-decoration: none; font-weight: 800; text-shadow: 0 0 10px rgba(251,191,36,0.3); }
        
        .nav-item {
            width: 55px; height: 55px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 18px; margin-bottom: 15px;
            color: var(--text-muted); cursor: pointer; font-size: 22px;
            position: relative;
        }
        .nav-item:hover, .nav-item.active {
            background: var(--accent); color: white;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        /* Main Layout Content */
        .main-content {
            margin-right: 90px;
            flex: 1;
            padding: 35px;
            height: 100vh;
            overflow-y: auto;
        }

        .section { display: none; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: var(--text-main); font-weight: 800; margin-bottom: 25px; font-size: 2rem; }
        .subtitle { color: var(--accent); font-size: 13px; font-weight: bold; letter-spacing: 1px; margin-bottom: 6px; display: block; }

        /* Glass Cards */
        .glass-card {
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Dashboard Grid Setup for Widgets */
        .dashboard-layout { display: grid; grid-template-columns: 1fr 340px; gap: 25px; }
        .dashboard-widgets { display: flex; flex-direction: column; gap: 20px; }
        .widget-title { font-size: 15px; color: var(--gold); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; font-weight: 700; }
        .widget-text { font-size: 14px; line-height: 1.7; color: var(--text-main); }

        /* Prayer Times Dashboard */
        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .prayer-card { text-align: center; padding: 15px 10px; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid var(--border-glass); }
        .prayer-name { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
        .prayer-time { font-size: 17px; font-weight: bold; color: var(--gold); }

        /* Quran Styles */
        .surah-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-height: 500px; overflow-y: auto; padding-left: 5px; }
        .surah-btn {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass);
            padding: 18px; border-radius: 16px; color: white; cursor: pointer; text-align: right;
            display: flex; justify-content: space-between; align-items: center;
        }
        .surah-btn:hover { background: rgba(255,255,255,0.07); border-color: var(--accent); transform: translateY(-3px); }
        .surah-num { background: var(--accent); width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; border-radius: 50%; font-size: 13px; font-weight: bold; }
        
        #quranReader { display: none; }
        .basmala-header { font-family: 'Amiri Quran', serif; font-size: 32px; text-align: center; color: var(--accent); margin-bottom: 25px; user-select: none; }
        .quran-text {
            font-family: 'Amiri Quran', serif; font-size: 26px; line-height: 2.5;
            text-align: justify; text-align-last: center; color: #f1f5f9; background: #030712;
            padding: 40px; border-radius: 24px; border: 1px solid var(--border-glass);
            max-height: 400px; overflow-y: auto; margin-bottom: 20px;
        }
        
        /* علامة نهاية الآية المحاكية للمصحف الحقيقي */
        .ayah-node {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            font-family: 'Tajawal', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: var(--gold);
            margin: 0 6px;
            vertical-align: middle;
            background: rgba(251, 191, 36, 0.05);
            box-shadow: 0 0 5px rgba(251, 191, 36, 0.2);
        }

        .ayah-span { cursor: pointer; padding: 2px 4px; border-radius: 6px; display: inline; }
        .ayah-span:hover { background: rgba(16, 185, 129, 0.15); color: var(--accent); }
        .ayah-span.active-highlight { background: rgba(251, 191, 36, 0.2); color: var(--gold); }
        
        /* التفسير والمشغل */
        .tafsir-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 20px; padding: 20px; margin-top: 25px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .audio-bar { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; background: rgba(17, 24, 39, 0.7); padding: 15px; border-radius: 16px; margin-bottom: 25px; border: 1px solid var(--border-glass); }
        .audio-bar select { background: #0f172a; color: white; border: 1px solid var(--border-glass); padding: 8px 12px; border-radius: 8px; font-family: Tajawal; outline: none; cursor: pointer; }
        audio { flex: 1; min-width: 250px; height: 35px; }
        .reader-nav { display: flex; justify-content: space-between; margin-top: 20px; gap: 15px; }

        /* Tasbeeh Counter */
        .tasbeeh-container { text-align: center; padding: 30px 0; }
        .tasbeeh-btn {
            width: 190px; height: 190px; border-radius: 50%;
            background: radial-gradient(circle, var(--accent) 0%, #064e3b 100%);
            border: 8px solid rgba(16, 185, 129, 0.15);
            color: white; font-size: 55px; font-weight: 800;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            margin: 0 auto 25px auto; box-shadow: 0 15px 35px rgba(16, 185, 129, 0.25);
            user-select: none;
        }
        .select-input {
            background: rgba(0,0,0,0.3); color: white; border: 1px solid var(--border-glass);
            padding: 12px 20px; border-radius: 12px; font-size: 15px; font-family: Tajawal;
            width: 100%; max-width: 300px; margin-
